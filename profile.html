<!DOCTYPE html>
<html>
<head>
<title>Candidate Details</title>

<style>

body{
    font-family: Arial;
    background:#e6e6e6;
    margin:0;
}

/* HEADER */
.header{
    background:#6c757d;
    padding:10px;
    text-align:center;
}

.header img{
    height:40px;
}

/* MAIN BOX */

.container{
    width:650px;
    margin:60px auto;
}

.box{
    background:#f2f2f2;
    border-radius:15px;
    border:2px solid #ccc;
    padding:0;
    box-shadow:0 0 5px gray;
}

/* TITLE */

.title{
    background:#d9d9d9;
    padding:15px;
    text-align:center;
    font-size:20px;
    border-top-left-radius:15px;
    border-top-right-radius:15px;
}

/* DETAILS */

.details{
    padding:30px;
}

.row{
    margin:15px 0;
}

.label{
    width:150px;
    display:inline-block;
    font-weight:bold;
}

/* DROPDOWN */

select{
    padding:5px;
}

/* BUTTON */

.btn{
    text-align:center;
    margin-top:20px;
}

button{
    background:#9acd32;
    border:none;
    padding:8px 25px;
    font-size:14px;
    cursor:pointer;
}

button:hover{
    background:#7fbf00;
}

</style>
</head>

<body>

<div class="header">
<img src="logo.png">
</div>

<div class="container">

<div class="box">

<div class="title">
Candidate Details
</div>

<div class="details">

<div class="row">
<span class="label">Name:</span> Thanuja
</div>

<div class="row">
<span class="label">Roll Number :</span> 123456
</div>

<div class="row">
<span class="label">center name :</span> CHANDANA RESOURCE CENTER
</div>

<div class="row">
<span class="label">center Code :</span> 100
</div>

<div class="row">
<span class="label">Subject :</span> ENGLISH
</div>

<div class="row">
<span class="label">Subject Code :</span> ENG123HZ
</div>

<div class="row">
<span class="label">Medium Code :</span>

<select>
<option>ENGLISH</option>
<option>HINDI</option>
</select>

</div>

<div class="btn">
<a href="instuction.html">
<button>Confirm</button>
</a>
</div>


</div>
</div>
</div>

</body>
</html>
